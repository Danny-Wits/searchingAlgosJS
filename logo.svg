<svg
  width="128"
  height="128"
  viewBox="0 0 128 128"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="SAVAGE Algorithm Visualizer Icon"
>
  <!-- Background -->
  <rect width="128" height="128" rx="18" fill="#000000"/>

  <!-- Grid -->
  <g stroke="#2a2a2a" stroke-width="2">
    <!-- Vertical lines -->
    <line x1="32" y1="20" x2="32" y2="108"/>
    <line x1="64" y1="20" x2="64" y2="108"/>
    <line x1="96" y1="20" x2="96" y2="108"/>

    <!-- Horizontal lines -->
    <line x1="20" y1="32" x2="108" y2="32"/>
    <line x1="20" y1="64" x2="108" y2="64"/>
    <line x1="20" y1="96" x2="108" y2="96"/>
  </g>

  <!-- Path -->
  <polyline
    points="32,32 64,32 64,64 96,64 96,96"
    fill="none"
    stroke="#c4f6b5"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Start Node -->
  <circle cx="32" cy="32" r="7" fill="#76ff76"/>

  <!-- End Node -->
  <circle cx="96" cy="96" r="7" fill="#5757ff"/>
</svg>
